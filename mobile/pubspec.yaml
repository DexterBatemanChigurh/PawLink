name: pawlink
description: PawLink - Ecossistema para adoção e cuidados de pets
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
